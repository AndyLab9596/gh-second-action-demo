name: Deploy website
on:
  push:
    branches:
      - master
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install nodejs
        uses: actions/setup-node@v6
        # with:
        #     node-version: 18
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
            path: ~/.npm 
            key: deps-node-modules-${{ hashFiles('**/package-lock.json') }} # computes a hash from any package-lock.json files in the repo
      - name: Install dependencies
        run: npm ci
    #   - name: Lint code
    #     run: npm run lint
      - name: Test code
        run: npm run test
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
        script-file: ${{ steps.publish.outputs.script-file }}
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
            path: ~/.npm 
            key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Build website
        run: npm run build
      - name: Public JS file name
        id: publish
        run: find dist/assets/*.js -type f -execdir echo 'script-file={}' >> $GITHUB_OUTPUT ';' 
        # run: find dist/assets/*.js -type f -execdir echo '::set-output name=script-file::{}' ';' 
      - name: Uploading Artifact
        uses: actions/upload-artifact@v7
        with:
            name: dist-files
            path: dist
            # path: |
            #     dist
            #     package.json
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get build artifacts
        uses: actions/download-artifact@v5
        with:
            name: dist-files
      - name: Output content
        run: ls
      - name: Output filename
        run: echo "${{ needs.build.outputs.script-file }}" 
      - name: Deploy
        run: echo "Deploying..."
