name: Deploy Project
on: push
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Get code 
              uses: actions/checkout@v6 #download code
            - name: Install nodejs
              uses: actions/setup-node@v3 # actually the ubuntu-latest has node, but we do it here for practice
              with:
                node-version: 18
            - name: Install dependencies
              run: npm ci # npm ci → cài đúng y chang version đã lock, không thay đổi gì
            - name: Run tests
              run: npm test
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Get code 
              uses: actions/checkout@v6 #download code
            - name: Install nodejs
              uses: actions/setup-node@v3 # actually the ubuntu-latest has node, but we do it here for practice
              with:
                node-version: 18
            - name: Install dependencies
              run: npm ci # npm ci → cài đúng y chang version đã lock, không thay đổi gì
            - name: Run tests
              run: npm test
            - name: Build Project
              run: npm run build
            - name: Deploy
              run: echo "Deploying..."